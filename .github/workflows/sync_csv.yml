name: Sync CSV from Public Repo

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout personal repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT }}

      - name: Download CSV from public repo
        run: |
          # Replace the URL below with the "Raw" link of the public CSV
          curl -L https://github.com/1155125384/get_eft_list/blob/544f20f34c3657a6dcc6affee04e0ba2ccdc0434/etf_data.csv -o etf_data.csv

      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add etf_data.csv
          
          # Only commit if the file actually changed to avoid empty commits
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Update CSV data: $(date)"
            git push
          fi
