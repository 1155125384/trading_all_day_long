<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF Alpha Analytics - Live Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; padding: 2rem; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; }
        .header-title { color: #38bdf8; font-weight: 800; border-left: 5px solid #38bdf8; padding-left: 15px; margin-bottom: 2rem; }
        
        /* DARK MODE TABLE FIXES */
        .table { border-color: #334155; color: #f1f5f9 !important; }
        .table thead th { background-color: #0f172a !important; color: #94a3b8 !important; border-bottom: 2px solid #38bdf8; }
        .ticker-cell { font-weight: 700; color: #38bdf8; }

        /* DATATABLES UI FIXES (Text Visibility) */
        .dataTables_wrapper .dataTables_length select,
        .dataTables_wrapper .dataTables_filter input {
            background-color: #0f172a !important;
            color: #fff !important;
            border: 1px solid #334155 !important;
        }
        .dataTables_wrapper .dataTables_info { color: #94a3b8 !important; }
        .dataTables_wrapper .dataTables_paginate .paginate_button { color: #fff !important; }
        .page-item.disabled .page-link { background-color: #1e293b; border-color: #334155; color: #475569; }
        .page-link { background-color: #0f172a; border-color: #334155; color: #38bdf8; }
        .page-item.active .page-link { background-color: #38bdf8; border-color: #38bdf8; color: #0f172a; }

        /* SPECIFIC TRADER COLOR LOGIC */
        /* Total Score: Rounded Box */
        .box-green { background-color: #15803d; color: white; padding: 4px 10px; border-radius: 8px; font-weight: bold; }
        .box-yellow { background-color: #a16207; color: white; padding: 4px 10px; border-radius: 8px; font-weight: bold; }
        .box-red { background-color: #b91c1c; color: white; padding: 4px 10px; border-radius: 8px; font-weight: bold; }

        /* Text only colors */
        .text-green { color: #4ade80 !important; font-weight: 600; }
        .text-yellow { color: #facc15 !important; font-weight: 600; }
        .text-red { color: #f87171 !important; font-weight: 600; }

        .loading-overlay { text-align: center; padding: 50px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="card">
        <h2 class="header-title">ETF MOMENTUM & ALPHA ANALYTICS</h2>
        
        <div id="loading" class="loading-overlay">
            <div class="spinner-border text-info" role="status"></div>
            <p class="mt-2">Fetching live market data...</p>
        </div>

        <div class="table-responsive">
            <table id="etfTable" class="table table-dark table-hover" style="width:100%; display:none;">
                <thead>
                    <tr>
                        <th>Ticker</th>
                        <th>Total Score</th>
                        <th>Momentum</th>
                        <th>Grading</th>
                        <th>Peak Mark</th>
                        <th>Cum Buy %</th>
                        <th>Price</th>
                        <th>1h Buy</th>
                        <th>6h Buy</th>
                        <th>1d Buy</th>
                        <th>Avg Vol</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
// Logic to determine color based on value
function getStatusColor(val) {
    const n = parseFloat(val);
    if (n >= 65) return 'green';
    if (n >= 55) return 'yellow';
    return 'red';
}

async function initDashboard() {
    try {
        const response = await fetch('etf_data.csv');
        if (!response.ok) throw new Error('Could not find etf_data.csv');
        const data = await response.text();

        const rows = data.trim().split('\n').slice(1);
        let html = '';

        rows.forEach(line => {
            const cols = line.split(',');
            if (cols.length < 10) return;

            const [ticker, total, mom, grade, peakM, cumB, price, b1h, b6h, b1d, b3d, st, mt, lt, vol] = cols;
            
            const totalColor = getStatusColor(total);
            const momColor = getStatusColor(mom);
            const gradeColor = getStatusColor(grade);
            const peakColor = getStatusColor(peakM);
            const cumBColor = getStatusColor(cumB);

            html += `<tr>
                <td class="ticker-cell">${ticker}</td>
                <td><span class="box-${totalColor}">${total}</span></td>
                <td class="text-${momColor}">${mom}</td>
                <td class="text-${gradeColor}">${grade}</td>
                <td class="text-${peakColor}">${peakM}</td>
                <td class="text-${cumBColor}">${cumB}%</td>
                <td>$${parseFloat(price).toFixed(2)}</td>
                <td>${b1h}%</td>
                <td>${b6h}%</td>
                <td>${b1d}%</td>
                <td>${parseInt(vol).toLocaleString()}</td>
            </tr>`;
        });

        document.getElementById('tableBody').innerHTML = html;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('etfTable').style.display = 'table';

        $('#etfTable').DataTable({
            order: [[1, 'desc']],
            pageLength: 25,
            language: { 
                search: "_INPUT_", 
                searchPlaceholder: "Search Ticker...",
                lengthMenu: "Show _MENU_ entries"
            }
        });

    } catch (err) {
        document.getElementById('loading').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
    }
}

initDashboard();
</script>
</body>
</html>
