<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF Alpha Analytics - Live Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', system-ui, sans-serif; padding: 2rem; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .header-title { color: #38bdf8; font-weight: 800; border-left: 5px solid #38bdf8; padding-left: 15px; margin-bottom: 2rem; }
        
        /* Table Customization */
        .table { border-color: #334155; }
        .table thead th { background-color: #0f172a; color: #94a3b8; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; border-bottom: 2px solid #38bdf8; }
        .table tbody td { border-bottom: 1px solid #334155; vertical-align: middle; }
        .ticker-cell { font-weight: 700; color: #38bdf8; }
        
        /* Indicators */
        .score-high { color: #4ade80; background: rgba(74, 222, 128, 0.1); border-radius: 4px; padding: 2px 6px; }
        .score-low { color: #f87171; background: rgba(248, 113, 113, 0.1); border-radius: 4px; padding: 2px 6px; }
        
        /* DataTables overrides */
        .dataTables_wrapper .dataTables_filter input { background-color: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; padding: 5px 15px; }
        .dataTables_info, .paginate_button { font-size: 0.85rem; color: #94a3b8 !important; }
        .loading-overlay { text-align: center; padding: 50px; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="card">
        <h2 class="header-title">ETF MOMENTUM & ALPHA ANALYTICS</h2>
        
        <div id="loading" class="loading-overlay">
            <div class="spinner-border text-info" role="status"></div>
            <p class="mt-2">Fetching etf_data.csv from server...</p>
        </div>

        <div class="table-responsive">
            <table id="etfTable" class="table table-dark table-hover" style="width:100%; display:none;">
                <thead>
                    <tr>
                        <th>Ticker</th>
                        <th>Total Score</th>
                        <th>Momentum</th>
                        <th>Grading</th>
                        <th>Peak Mark</th>
                        <th>Cum Buy %</th>
                        <th>Price</th>
                        <th>1h Buy</th>
                        <th>6h Buy</th>
                        <th>1d Buy</th>
                        <th>3d Buy</th>
                        <th>ST Trend</th>
                        <th>MT Trend</th>
                        <th>LT Trend</th>
                        <th>Avg Vol</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
async function initDashboard() {
    try {
        // 1. Fetch the CSV from GitHub Pages / Relative path
        const response = await fetch('etf_data.csv');
        if (!response.ok) throw new Error('Could not find etf_data.csv');
        const data = await response.text();

        // 2. Parse CSV Data
        const lines = data.trim().split('\n');
        const headers = lines[0].split(',');
        const rows = lines.slice(1);

        let html = '';
        rows.forEach(line => {
            const cols = line.split(',');
            if (cols.length < 10) return; // Skip empty/malformed lines

            const getStyle = (val) => parseFloat(val) > 60 ? 'score-high' : (parseFloat(val) < 55 ? 'score-low' : '');

            html += `<tr>
                <td class="ticker-cell">${cols[0]}</td>
                <td><span class="${getStyle(cols[1])}">${cols[1]}</span></td>
                <td><span class="${getStyle(cols[2])}">${cols[2]}</span></td>
                <td>${cols[3]}</td>
                <td>${cols[4]}</td>
                <td>${cols[5]}%</td>
                <td>$${parseFloat(cols[6]).toFixed(2)}</td>
                <td>${cols[7]}%</td>
                <td>${cols[8]}%</td>
                <td>${cols[9]}%</td>
                <td>${cols[10]}%</td>
                <td>${cols[11]}</td>
                <td>${cols[12]}</td>
                <td>${cols[13]}</td>
                <td>${parseInt(cols[14]).toLocaleString()}</td>
            </tr>`;
        });

        // 3. Inject and Initialize Table
        document.getElementById('tableBody').innerHTML = html;
        document.getElementById('loading').style.display = 'none';
        const table = document.getElementById('etfTable');
        table.style.display = 'table';

        $('#etfTable').DataTable({
            order: [[1, 'desc']], // Sort by Total Score
            pageLength: 15,
            language: { search: "_INPUT_", searchPlaceholder: "Search Ticker..." }
        });

    } catch (err) {
        document.getElementById('loading').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
    }
}

initDashboard();
</script>
</body>
</html>
