<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Alpha Terminal | Column Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary-blue: #38bdf8;
            --text-main: #f1f5f9;
        }

        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 1.5rem; }
        .card { background-color: var(--card-bg); border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; }
        .header-title { color: var(--primary-blue); font-weight: 800; border-left: 5px solid var(--primary-blue); padding-left: 15px; margin-bottom: 1.5rem; }
        
        /* Column Control Panel */
        .control-panel { background: #0f172a; border-radius: 8px; padding: 15px; margin-bottom: 20px; border: 1px solid #38bdf8; }
        .btn-group-toggle .btn { font-size: 0.75rem; margin-bottom: 5px; border-color: #334155; color: #94a3b8; }
        .btn-group-toggle .btn:hover { color: #38bdf8; border-color: #38bdf8; }
        .btn-group-toggle .btn.active { background-color: #38bdf8; color: #0f172a; font-weight: bold; }

        /* Table Styling */
        .table { color: var(--text-main) !important; }
        .table thead th { background-color: #0f172a !important; color: #94a3b8 !important; font-size: 0.8rem; border-bottom: 2px solid var(--primary-blue); }
        .ticker-cell { font-weight: 700; color: var(--primary-blue); }

        /* Score Logic */
        .box-green { background-color: #166534; color: #fff; padding: 3px 8px; border-radius: 6px; font-weight: bold; display: inline-block; }
        .box-yellow { background-color: #854d0e; color: #fff; padding: 3px 8px; border-radius: 6px; font-weight: bold; display: inline-block; }
        .box-red { background-color: #991b1b; color: #fff; padding: 3px 8px; border-radius: 6px; font-weight: bold; display: inline-block; }
        .text-green { color: #4ade80 !important; font-weight: 600; }
        .text-yellow { color: #facc15 !important; font-weight: 600; }
        .text-red { color: #f87171 !important; font-weight: 600; }
        .box-lightgreen { background-color: #15803d; color: #fff; padding: 3px 8px; border-radius: 6px; font-weight: bold; display: inline-block; }
        .box-orange { background-color: #c2410c; color: #fff; padding: 3px 8px; border-radius: 6px; font-weight: bold; display: inline-block; }
        .text-lightgreen { color: #86efac !important; font-weight: 600; }
        .text-orange { color: #fb923c !important; font-weight: 600; }

        /* DataTable visibility fixes */
        .dataTables_wrapper .dataTables_length select, .dataTables_wrapper .dataTables_filter input {
            background-color: var(--bg-dark) !important; color: #fff !important; border: 1px solid #334155 !important;
        }
        .dataTables_info, .dataTables_paginate { color: #94a3b8 !important; }
        .page-link { background-color: var(--bg-dark); color: var(--primary-blue); border-color: #334155; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="card">
        <h2 class="header-title">PRO ALPHA TERMINAL</h2>

        <div class="control-panel">
            <h6 class="mb-3 text-uppercase" style="color:#38bdf8; font-size: 0.8rem;">Column Visibility Controls</h6>
            <div class="mb-3">
                <span class="me-2 text-muted small">Quick Groups:</span>
                <button class="btn btn-sm btn-outline-info" onclick="toggleGroup('scores')">Scores Only</button>
                <button class="btn btn-sm btn-outline-info" onclick="toggleGroup('trends')">Trends Only</button>
                <button class="btn btn-sm btn-outline-info" onclick="toggleGroup('all')">Show All</button>
            </div>
            <div id="colToggleButtons" class="btn-group-toggle d-flex flex-wrap gap-1">
                </div>
        </div>

        <div id="loading" class="text-center py-4">
            <div class="spinner-border text-info"></div>
        </div>

        <div class="table-responsive">
            <table id="etfTable" class="table table-dark table-hover w-100" style="display:none;">
                <thead>
                    <tr>
                        <th>Ticker</th>
                        <th>Total Score</th>
                        <th>Momentum</th>
                        <th>Grading</th>
                        <th>Peak Mark</th>
                        <th>Cum Buy %</th>
                        <th>Price</th>
                        <th>1h %</th>
                        <th>6h %</th>
                        <th>1d %</th>
                        <th>Short</th>
                        <th>Med</th>
                        <th>Long</th>
                        <th>Avg Vol</th>
                        <th>Peak Pr.</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
let dataTable;

function getScoreStyle(val, isBox) {
    const n = parseFloat(val);
    let type;

    if (n >= 70) {
        type = 'green';       // Excellent
    } else if (n >= 60) {
        type = 'lightgreen';  // Good
    } else if (n >= 50) {
        type = 'yellow';      // Average (middle)
    } else if (n >= 40) {
        type = 'orange';      // Poor
    } else {
        type = 'red';         // Very poor
    }

    return isBox ? `box-${type}` : `text-${type}`;
}


async function initDashboard() {
    try {
        const response = await fetch('etf_data.csv');
        const data = await response.text();
        const rows = data.trim().split('\n').slice(1);
        let html = '';

        rows.forEach(line => {
            const cols = line.split(',');
            if (cols.length < 15) return;
            const [ticker, total, mom, grade, peakM, cumB, price, b1h, b6h, b1d, b3d, st, mt, lt, vol, peakP] = cols;

            html += `<tr>
                <td class="ticker-cell">${ticker}</td>
                <td><span class="${getScoreStyle(total, true)}">${total}</span></td>
                <td class="${getScoreStyle(mom, false)}">${mom}</td>
                <td class="${getScoreStyle(grade, false)}">${grade}</td>
                <td class="${getScoreStyle(peakM, false)}">${peakM}</td>
                <td class="${getScoreStyle(cumB, false)}">${cumB}%</td>
                <td>$${parseFloat(price).toFixed(2)}</td>
                <td>${b1h}%</td>
                <td>${b6h}%</td>
                <td>${b1d}%</td>
                <td>${st}</td>
                <td>${mt}</td>
                <td>${lt}</td>
                <td>${parseInt(vol).toLocaleString()}</td>
                <td>$${parseFloat(peakP).toFixed(2)}</td>
            </tr>`;
        });

        document.getElementById('tableBody').innerHTML = html;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('etfTable').style.display = 'table';

        dataTable = $('#etfTable').DataTable({
            order: [[1, 'desc']],
            pageLength: 25,
            lengthMenu: [[10, 25, 50, -1], [10, 25, 50, "All"]],
            language: { search: "", searchPlaceholder: "Search Ticker..." }
        });

        setupColumnControls();

    } catch (err) {
        console.error(err);
    }
}

function setupColumnControls() {
    const container = document.getElementById('colToggleButtons');
    dataTable.columns().every(function() {
        const column = this;
        const header = column.header().innerText;
        const btn = document.createElement('button');
        btn.innerHTML = header;
        btn.className = 'btn btn-sm btn-outline-secondary active';
        btn.onclick = function() {
            const visible = column.visible();
            column.visible(!visible);
            this.classList.toggle('active', !visible);
        };
        container.appendChild(btn);
    });
}

function toggleGroup(type) {
    const scoreIdx = [1, 2, 3, 4, 5];
    const trendIdx = [10, 11, 12, 13];
    const allIdx = Array.from({length: 15}, (_, i) => i);

    // Hide all first
    dataTable.columns().visible(false);
    
    let toShow = [0, 6]; // Always keep Ticker and Price
    if (type === 'scores') toShow = toShow.concat(scoreIdx);
    else if (type === 'trends') toShow = toShow.concat(trendIdx);
    else toShow = allIdx;

    dataTable.columns(toShow).visible(true);
    
    // Update button states
    $('#colToggleButtons button').each(function(index) {
        $(this).toggleClass('active', dataTable.column(index).visible());
    });
}

initDashboard();
</script>
</body>
</html>
