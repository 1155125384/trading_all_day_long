name: Push CSV to Dashboard Repo
on:
  schedule:
    - cron: '*/10 * * * *' # Shorter way to write "every 10 minutes"
  workflow_dispatch: 

jobs:
  copy-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Pushes CSV Only
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          # --- CRITICAL FIXES START HERE ---
          source-directory: '.'      # Tells the action to look in the root folder
          source-file: 'etf_data.csv' 
          # ---------------------------------
          
          destination-github-username: '1155125384'
          destination-repository-name: 'webull_trade_24h'
          user-email: 1155125384@link.cuhk.edu.hk
          target-branch: main
          target-directory: ''
